<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ========================================
     CSS VARIABLES
     ======================================== */
  :root {
    --bg: #FAFAF8;
    --bg-warm: #F5F4F0;
    --text: #1a1a18;
    --text-secondary: #6b6b66;
    --text-tertiary: #9c9c97;
    --border: #e5e4e0;
    --border-light: #eeedea;
    --accent: #1a1a18;
    --accent-green: #2d6a4f;
    --highlight: #e8f5e9;
    --card-bg: #ffffff;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.08);
  }

  /* ========================================
     RESET & BASE
     ======================================== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  ::selection {
    background: var(--accent-green);
    color: white;
  }

  /* ========================================
     PAGE LOAD ANIMATION
     ======================================== */
  .page-loader {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  .page-loader.loaded {
    opacity: 0;
    visibility: hidden;
  }

  .page-loader .loader-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text);
    opacity: 0;
    animation: loaderFade 0.8s ease 0.1s forwards;
  }

  @keyframes loaderFade {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ========================================
     NAV
     ======================================== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    background: rgba(250,250,248,0.8);
    border-bottom: 1px solid rgba(229,228,224,0.5);
    transition: all 0.4s ease;
  }

  nav.scrolled {
    padding: 0.75rem 3rem;
    box-shadow: 0 1px 12px rgba(0,0,0,0.04);
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    align-items: center;
  }

  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: color 0.3s;
    position: relative;
  }

  .nav-links a:not(.nav-cta)::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--accent-green);
    transition: width 0.3s ease;
  }

  .nav-links a:not(.nav-cta):hover::after { width: 100%; }
  .nav-links a:hover { color: var(--text); }

  .nav-links a.active {
    color: var(--text);
  }

  .nav-links a.active::after {
    width: 100%;
  }

  .nav-cta {
    background: var(--accent) !important;
    color: var(--bg) !important;
    padding: 0.5rem 1.25rem;
    border-radius: 100px;
    font-weight: 600 !important;
    font-size: 0.78rem !important;
    transition: transform 0.2s, opacity 0.2s;
  }

  .nav-cta:hover { opacity: 0.88; transform: translateY(-1px); }
  .nav-cta::after { display: none !important; }

  /* Mobile hamburger */
  .nav-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    z-index: 101;
  }

  .nav-toggle span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: var(--text);
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .nav-toggle.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2) { opacity: 0; }
  .nav-toggle.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  /* Mobile nav drawer */
  .nav-drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg);
    z-index: 99;
    display: none;
    flex-direction: column;
    padding-top: 5rem;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  .nav-drawer.open {
    transform: translateX(0);
  }

  .nav-drawer a {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.95rem;
  }

  .nav-drawer a.active {
    color: var(--accent-green);
    font-weight: 600;
  }

  .nav-drawer a.nav-cta {
    background: var(--accent);
    color: var(--bg) !important;
    border: none;
    margin: 1rem 2rem;
    text-align: center;
  }

  /* ========================================
     HERO
     ======================================== */
  .hero {
    min-height: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 8rem 2rem 2rem;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  .hero h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 400;
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
  }

  .hero-sub {
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 580px;
    line-height: 1.6;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
  }

  /* ========================================
     ARTICLES GRID
     ======================================== */
  .articles-section {
    max-width: 1000px;
    margin: 0 auto;
    padding: 4rem 2rem;
  }

  .articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 2.5rem;
    margin-top: 3rem;
  }

  .article-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
  }

  .article-card.reveal {
    animation: revealCard 0.6s ease forwards;
  }

  @keyframes revealCard {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .article-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(45,106,79,0.03) 0%, transparent 100%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .article-card:hover {
    border-color: var(--accent-green);
    box-shadow: 0 12px 40px rgba(45,106,79,0.08);
    transform: translateY(-8px);
  }

  .article-card:hover::before {
    opacity: 1;
  }

  .article-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-green);
    margin-bottom: 1rem;
    align-self: flex-start;
  }

  .article-tag.case-study {
    color: var(--accent-green);
  }

  .article-tag.blog {
    color: var(--text-secondary);
  }

  .article-card h2 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 1.5rem;
    font-weight: 400;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 1rem;
    flex-grow: 1;
  }

  .article-card p {
    font-size: 0.95rem;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 1.5rem;
    flex-grow: 1;
  }

  .article-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 1rem;
    border-top: 1px solid var(--border-light);
    color: var(--text-tertiary);
    font-size: 0.82rem;
  }

  .read-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .read-more {
    color: var(--accent-green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .article-card:hover .read-more {
    transform: translateX(4px);
  }

  /* ========================================
     FOOTER
     ======================================== */
  footer {
    border-top: 1px solid var(--border);
    padding: 3rem 2rem;
    margin-top: 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1000px;
    margin-left: auto;
    margin-right: auto;
    color: var(--text-secondary);
    font-size: 0.82rem;
  }

  footer a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.3s;
  }

  footer a:hover {
    color: var(--accent-green);
  }

  .footer-right {
    display: flex;
    gap: 2rem;
  }

  /* ========================================
     RESPONSIVE
     ======================================== */
  @media (max-width: 768px) {
    nav {
      padding: 1rem 1.5rem;
    }

    nav.scrolled {
      padding: 0.75rem 1.5rem;
    }

    .nav-links {
      display: none;
    }

    .nav-toggle {
      display: flex;
    }

    .nav-drawer {
      display: flex;
    }

    .hero {
      padding: 6rem 1.5rem 2rem;
      min-height: auto;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
    }

    .hero-sub {
      font-size: 0.95rem;
    }

    .articles-grid {
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .articles-section {
      padding: 3rem 1.5rem;
    }

    footer {
      flex-direction: column;
      gap: 1.5rem;
      text-align: center;
    }

    .footer-right {
      justify-content: center;
    }
  }

  @media (max-width: 480px) {
    nav {
      padding: 0.75rem 1rem;
    }

    .hero {
      padding: 4rem 1rem 2rem;
    }

    .hero h1 {
      font-size: 1.6rem;
    }

    .article-card {
      padding: 1.5rem;
    }
  }
</style>
</head>
<body>

<!-- Page Loader -->
<div class="page-loader" id="pageLoader">
  <div class="loader-logo">WRKSTREAM</div>
</div>

<!-- Navigation -->
<nav id="mainNav">
  <a href="/" class="logo">WRKSTREAM</a>
  <div class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-links" id="navLinks">
    <a href="/#workshop">Workshop</a>
    <a href="/#work">Work</a>
    <a href="/blog" class="active">Blog</a>
    <a href="/#about">About</a>
    <a href="https://tidycal.com/cjmayer/15-minute-intro" target="_blank" rel="noopener" class="nav-cta">Book a Call</a>
  </div>
  <div class="nav-drawer" id="navDrawer">
    <a href="/#workshop">Workshop</a>
    <a href="/#work">Work</a>
    <a href="/blog" class="active">Blog</a>
    <a href="/#about">About</a>
    <a href="https://tidycal.com/cjmayer/15-minute-intro" target="_blank" rel="noopener" class="nav-cta">Book a Call</a>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">
  <h1>Insights</h1>
  <p class="hero-sub">Case studies, strategy, and lessons from building AI-powered operations for mid-market companies.</p>
</section>

<!-- Articles Section -->
<section class="articles-section">
  <div class="articles-grid" id="articlesGrid">
    <!-- Articles will be inserted here by JavaScript -->
  </div>
</section>

<!-- Footer -->
<footer>
  <div class="footer-left">© 2026 WRKSTREAM LLC</div>
  <div class="footer-right">
    <a href="https://www.linkedin.com/company/wrkstream" target="_blank" rel="noopener">LinkedIn</a>
    <a href="mailto:justin@wrkstream.com">Email</a>
  </div>
</footer>

<script>
  // Articles data
  const articles = [
    {
      tag: 'Case Study',
      title: 'How We Built a $200K Platform for $20K',
      excerpt: 'LivNow Relocation needed a platform to manage operations. Dev shops quoted $200K. We built it for a tenth of that, and it changed how we think about software.',
      url: '/blog/livnow-case-study',
      readTime: '8 min read'
    },
    {
      tag: 'Case Study',
      title: 'What a Master Tailor Can Teach About AI Readiness',
      excerpt: 'A tailor with exceptional craft and a website from 2016. The gap between skill and infrastructure is the same gap holding back thousands of companies.',
      url: '/blog/tailor-case-study',
      readTime: '7 min read'
    },
    {
      tag: 'Blog',
      title: 'Just Because I Can Cook Doesn\'t Mean I Should Be a Chef',
      excerpt: 'AI tools have democratized creation. But literacy is not expertise, and the line between \'I can do this\' and \'I should be doing this\' is costing companies real money.',
      url: '/blog/just-because-i-can-cook',
      readTime: '8 min read'
    },
    {
      tag: 'Blog',
      title: 'Why Mid-Market Companies Overpay for Software',
      excerpt: 'A company quotes $300K for custom software. 75% goes to engineering. The problem? Nobody spent time understanding the actual business.',
      url: '/blog/why-companies-overpay-for-software',
      readTime: '6 min read'
    },
    {
      tag: 'Blog',
      title: 'The $50M Company AI Gap',
      excerpt: 'OpenAI and McKinsey are running AI workshops for Fortune 500s. If your company does $10M to $250M in revenue, nobody is building for you.',
      url: '/blog/the-50m-company-ai-gap',
      readTime: '6 min read'
    },
    {
      tag: 'Blog',
      title: 'How Software Costs Dropped 99% in 3 Years',
      excerpt: 'In 2022, a custom tool cost $150K+. In 2026, the same tool can be built in weeks. The implications for your business are massive.',
      url: '/blog/how-software-costs-dropped-99-percent',
      readTime: '7 min read'
    }
  ];

  // Render articles
  function renderArticles() {
    const grid = document.getElementById('articlesGrid');
    grid.innerHTML = articles.map((article, index) => `
      <a href="${article.url}" class="article-card" style="animation-delay: ${index * 0.1}s;">
        <div class="article-tag ${article.tag.toLowerCase().replace(' ', '-')}">${article.tag}</div>
        <h2>${article.title}</h2>
        <p>${article.excerpt}</p>
        <div class="article-meta">
          <span class="read-time">${article.readTime}</span>
          <span class="read-more">Read →</span>
        </div>
      </a>
    `).join('');

    // Trigger reveal animation
    setTimeout(() => {
      document.querySelectorAll('.article-card').forEach(card => {
        card.classList.add('reveal');
      });
    }, 100);
  }

  // Scroll reveal with IntersectionObserver
  function setupScrollReveal() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('reveal');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    // Start observing after initial render
    setTimeout(() => {
      document.querySelectorAll('.article-card:not(.reveal)').forEach(card => {
        observer.observe(card);
      });
    }, 100);
  }

  // Mobile nav toggle
  function setupMobileNav() {
    const navToggle = document.getElementById('navToggle');
    const navDrawer = document.getElementById('navDrawer');
    const navLinks = navDrawer.querySelectorAll('a');

    navToggle.addEventListener('click', () => {
      navToggle.classList.toggle('open');
      navDrawer.classList.toggle('open');
    });

    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        navToggle.classList.remove('open');
        navDrawer.classList.remove('open');
      });
    });

    // Close drawer when clicking outside
    document.addEventListener('click', (e) => {
      if (!navToggle.contains(e.target) && !navDrawer.contains(e.target)) {
        navToggle.classList.remove('open');
        navDrawer.classList.remove('open');
      }
    });
  }

  // Sticky nav effect
  function setupStickyNav() {
    const nav = document.getElementById('mainNav');
    let lastScrollY = 0;

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      if (scrollY > 50) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
      lastScrollY = scrollY;
    });
  }

  // Page loader
  function setupPageLoader() {
    const loader = document.getElementById('pageLoader');
    window.addEventListener('load', () => {
      loader.classList.add('loaded');
    });
    // Fallback: hide loader after 2 seconds regardless
    setTimeout(() => {
      loader.classList.add('loaded');
    }, 2000);
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    renderArticles();
    setupScrollReveal();
    setupMobileNav();
    setupStickyNav();
    setupPageLoader();
  });
</script>

</body>
</html>
